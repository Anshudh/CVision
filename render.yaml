services:
  - type: web
    name: cvision-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cvision-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: NODE_ENV
        value: production

databases:
  - name: cvision-db
    plan: free
