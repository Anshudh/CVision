services:
  - type: web
    name: cvision-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        sync: false
      - key: DB_SSL
        value: true
      - key: GOOGLE_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
